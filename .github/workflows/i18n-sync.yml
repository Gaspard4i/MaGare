name: Sync translations from Loco

on:
  repository_dispatch:
    types: [loco-webhook]     # Triggered by Loco webhook
  workflow_dispatch:           # Manual trigger
  schedule:
    - cron: '0 8 * * *'       # Daily fallback at 8am UTC

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run i18n:pull

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/i18n/*.json
          if git diff --cached --quiet; then
            echo "No translation changes"
          else
            git commit -m "chore: sync translations from Loco"
            git push
          fi
