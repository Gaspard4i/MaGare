<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect (single-page-apps-for-github-pages technique)
      // Encodes the path into a query string so index.html can restore it
      var seg = window.location.pathname.replace('/MaGare', '').replace(/\/+$/, '');
      if (seg) {
        window.location.replace(
          window.location.origin + '/MaGare/?p=' + encodeURIComponent(seg) + window.location.hash
        );
      } else {
        window.location.replace(window.location.origin + '/MaGare/');
      }
    </script>
  </head>
  <body></body>
</html>
